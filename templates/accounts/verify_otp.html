{% extends 'base.html' %}

{% block title %}Verify OTP - University Module Registration System{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-8">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-gray-900">Verify Your Email</h2>
        <p class="text-gray-600 mt-2">Enter the OTP code sent to {{ user.email }}</p>
    </div>

    <form method="post" class="space-y-6">
        {% csrf_token %}
        
        <div>
            <label for="otp_code" class="block text-sm font-medium text-gray-700">OTP Code</label>
            <input type="text" name="otp_code" id="otp_code" required maxlength="6"
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-center text-lg tracking-widest"
                   placeholder="000000">
        </div>

        <div>
            <button type="submit" 
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                Verify Email
            </button>
        </div>
    </form>

    <div class="mt-6 text-center">
        <p class="text-sm text-gray-600 mb-2">
            Didn't receive the code?
        </p>
        <a href="{% url 'accounts:resend_otp' user.id %}" 
           class="font-medium text-blue-600 hover:text-blue-500">
            Resend OTP
        </a>
    </div>

    <div class="mt-4 text-center">
        <p class="text-xs text-gray-500">
            OTP expires in 15 minutes
        </p>
    </div>
</div>
{% endblock %}
